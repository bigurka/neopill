blueprint:
  name: NeoPill - Promemoria assunzione farmaci (fascia oraria)
  description: >-
    Quando una o più dosi di farmaci NeoPill risultano "da assumere" tra
    quelle scelte (es. tutti i farmaci di una stessa fascia oraria, o tutti
    quelli di un paziente), invia UNA notifica push cumulativa con l'elenco
    di tutti i farmaci attualmente dovuti e i pulsanti "Assumi tutti" /
    "Non assunto". Se non arriva nessuna risposta, la notifica viene
    ripetuta a intervalli regolari (ricalcolando ogni volta l'elenco
    aggiornato dei farmaci ancora dovuti) finché non si risponde o finché
    tutte le dosi non si risolvono da sole. Alla risposta, viene chiamato
    neopill.assumi_farmaco oppure neopill.segna_non_assunta per ciascun
    farmaco ancora dovuto in quel momento.
  domain: automation
  author: bigurka
  source_url: https://github.com/bigurka/neopill/blob/main/blueprints/automation/bigurka/neopill_dose_reminder.yaml
  input:
    dose_due_entities:
      name: Sensori "Da assumere"
      description: >-
        I binary_sensor "dose_due" dei farmaci NeoPill da monitorare insieme
        (es. tutti i farmaci della stessa fascia oraria di un paziente, o
        anche tutti i farmaci del paziente).
      selector:
        entity:
          multiple: true
          domain: binary_sensor
          integration: neopill
    notify_device:
      name: Dispositivo per la notifica
      description: Il dispositivo mobile (app Home Assistant) a cui inviare il promemoria.
      selector:
        device:
          integration: mobile_app
    repeat_interval_minutes:
      name: Intervallo di ripetizione (minuti)
      description: Ogni quanti minuti ripetere la notifica se non si risponde.
      default: 15
      selector:
        number:
          min: 1
          max: 180
          unit_of_measurement: minuti
          mode: box
    max_repeats:
      name: Numero massimo di ripetizioni
      description: >-
        Dopo quante notifiche senza risposta l'automazione smette di
        insistere (per sicurezza, evita ripetizioni infinite).
      default: 20
      selector:
        number:
          min: 1
          max: 200
          mode: box

mode: single

trigger:
  - platform: state
    entity_id: !input dose_due_entities
    to: "on"

variables:
  dose_due_entities: !input dose_due_entities
  notify_device: !input notify_device
  max_repeats: !input max_repeats

action:
  - repeat:
      while:
        - condition: template
          value_template: >-
            {{ dose_due_entities | select('is_state', 'on') | list | count > 0
               and repeat.index <= max_repeats }}
      sequence:
        - variables:
            farmaci_dovuti: >-
              {% set ns = namespace(items=[]) %}
              {% for e in dose_due_entities if is_state(e, 'on') %}
                {% set ns.items = ns.items + [{
                     'id': state_attr(e, 'medication_id'),
                     'name': state_attr(e, 'medication_full_name') or state_attr(e, 'medication_name') or 'farmaco',
                   }] %}
              {% endfor %}
              {{ ns.items }}
        - action: "notify.mobile_app_{{ device_attr(notify_device, 'name') | slugify }}"
          data:
            title: "Promemoria farmaci"
            message: >-
              È ora di assumere: {{ farmaci_dovuti | map(attribute='name') | join(', ') }}.
            data:
              tag: "neopill_dose_group_{{ context.id }}"
              actions:
                - action: "NEOPILL_TUTTI_ASSUNTI_{{ context.id }}"
                  title: "Assumi tutti"
                - action: "NEOPILL_NON_ASSUNTO_{{ context.id }}"
                  title: "Non assunto"
        - wait_for_trigger:
            - platform: event
              event_type: mobile_app_notification_action
              event_data:
                action: "NEOPILL_TUTTI_ASSUNTI_{{ context.id }}"
            - platform: event
              event_type: mobile_app_notification_action
              event_data:
                action: "NEOPILL_NON_ASSUNTO_{{ context.id }}"
          timeout:
            minutes: !input repeat_interval_minutes
          continue_on_timeout: true
        - choose:
            - conditions: "{{ wait.trigger is not none and wait.trigger.event.data.action.startswith('NEOPILL_TUTTI_ASSUNTI_') }}"
              sequence:
                - repeat:
                    for_each: "{{ farmaci_dovuti }}"
                    sequence:
                      - action: neopill.assumi_farmaco
                        data:
                          medication_id: "{{ repeat.item.id }}"
            - conditions: "{{ wait.trigger is not none and wait.trigger.event.data.action.startswith('NEOPILL_NON_ASSUNTO_') }}"
              sequence:
                - repeat:
                    for_each: "{{ farmaci_dovuti }}"
                    sequence:
                      - action: neopill.segna_non_assunta
                        data:
                          medication_id: "{{ repeat.item.id }}"
